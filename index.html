<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Robux Store</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="header">
  <div class="logo">🪙 Robux Store</div>
</div>

<div id="shop" class="shop"></div>

<!-- POPUP -->
<div id="popup" class="popup">
  <div class="popup-card">

    <div class="close" onclick="closePopup()">✕</div>

    <h2 id="popupTitle"></h2>

    <!-- STEP 1: Roblox Info -->
    <div id="step1" class="step">
      <input id="display" placeholder="Roblox Display Name">
      <input id="username" placeholder="Roblox Username">
      <button class="main-btn" onclick="goEmailStep()">Continue</button>
    </div>

    <!-- STEP 2: Email -->
    <div id="step2" class="step hidden">
      <input id="email" type="email" placeholder="Enter your email">
      <button class="main-btn" onclick="goPaymentStep()">Continue</button>
    </div>

    <!-- STEP 3: Payment -->
    <div id="step3" class="step hidden">
      <select id="payment">
        <option value="">Select payment method</option>
        <option value="gamepass">Gamepass</option>
        <option value="group">Group Transfer</option>
      </select>

      <div id="groupInfo" class="hidden group-box">
        Join the group before ordering:<br>
        <a href="https://www.roblox.com/communities/34674460/Cool-Games-Studio#!/about" target="_blank">
          Cool Games Studio
        </a>
      </div>

      <button class="main-btn" onclick="finishOrder()">Confirm Order</button>
    </div>

    <div id="success" class="hidden success">
      ✔ Order Submitted!
    </div>

    <button class="cancel" onclick="closePopup()">Cancel</button>

  </div>
</div>

<!-- EmailJS -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>
<script>
(function(){
  emailjs.init("YOUR_PUBLIC_KEY"); // <-- Replace with your EmailJS API Key
})();
</script>

<!-- Your JS -->
<script src="script.js"></script>
</body>
</html>
